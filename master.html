<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #eef2f3; padding: 20px; }
        .admin-card { background: white; padding: 15px; border-radius: 12px; max-width: 500px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .item { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .btn-del { background: #ff4444; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .btn-toggle { background: #007aff; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="admin-card">
    <h2 style="text-align:center;">Master Admin Control</h2>
    <div id="list">Loading Contractors...</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAtv8io-eRu0EvNAbIWYrIyjWSQmuDhH8k",
        authDomain: "contrectors-zone-25c0a.firebaseapp.com",
        projectId: "contrectors-zone-25c0a",
        databaseURL: "https://contrectors-zone-25c0a-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const pass = prompt("Admin Password:");
    if(pass !== "tamir@00769") {
        alert("Ghalat Password!");
        window.location.href = "index.html";
    }

    db.ref('contractors').on('value', snap => {
        const data = snap.val();
        let html = "";
        if(!data) html = "No contractors found.";
        else {
            for(let id in data) {
                const c = data[id].profile;
                const status = data[id].status || 'ON';
                html += `<div class="item">
                    <span><b>${c.n}</b> (${id})<br><small>Status: ${status}</small></span>
                    <div>
                        <button class="btn-toggle" onclick="tgl('${id}', '${status}')">ON/OFF</button>
                        <button class="btn-del" onclick="del('${id}')">DEL</button>
                    </div>
                </div>`;
            }
        }
        document.getElementById('list').innerHTML = html;
    });

    function tgl(id, s) {
        db.ref('contractors/'+id+'/status').set(s === 'ON' ? 'OFF' : 'ON');
    }

    function del(id) {
        if(confirm("Delete Contractor?")) db.ref('contractors/'+id).remove();
    }
</script>
</body>
</html>
