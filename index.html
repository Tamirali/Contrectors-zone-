<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Contractor Pro | Real-Time Management System</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
    <!-- QR Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 24px 16px 48px;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
        }

        .hidden {
            display: none !important;
        }

        /* Modern Glassmorphism Cards */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.25);
        }

        /* Hero Banner */
        .hero-banner {
            position: relative;
            width: 100%;
            height: 280px;
            border-radius: 32px;
            overflow: hidden;
            margin-bottom: 8px;
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.2);
        }

        .hero-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .banner-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
            padding: 30px 20px 20px;
            color: white;
            text-align: center;
        }

        .banner-overlay h1 {
            font-size: 1.9rem;
            font-weight: 700;
            margin-bottom: 6px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .wa-button {
            background: #25D366;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border-radius: 60px;
            padding: 10px 24px;
            font-weight: 600;
            color: white;
            text-decoration: none;
            margin-top: 10px;
            transition: transform 0.2s;
            box-shadow: 0 4px 12px rgba(37,211,102,0.3);
        }

        .wa-button:hover {
            transform: scale(1.05);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            border: none;
            border-radius: 60px;
            padding: 12px 24px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f3f4f6;
            color: #1f2937;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #667eea;
            color: #667eea;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Form Elements */
        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            font-size: 0.9rem;
            margin: 8px 0 12px;
            transition: all 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Project Card */
        .project-card {
            margin-bottom: 20px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .project-card img {
            width: 100%;
            border-radius: 20px;
            margin-top: 12px;
            max-height: 300px;
            object-fit: cover;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 14px;
            z-index: 10000;
            animation: slideUp 0.3s ease;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
        }

        @keyframes slideUp {
            from {
                transform: translateX(-50%) translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .footer-links button {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: none;
            padding: 10px 20px;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .footer-links button:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        .project-date {
            font-size: 0.7rem;
            color: #6b7280;
            margin-top: 8px;
            display: inline-block;
            background: #f3f4f6;
            padding: 4px 12px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

<div id="main-view" class="container">
    <div id="profile-area">
        <div class="hero-banner">
            <img id="coverImage" src="https://images.unsplash.com/photo-1541888946425-d81bb19480c5?w=800" alt="Cover">
            <div class="banner-overlay">
                <h1 id="contractorName">Loading...</h1>
                <p id="phoneDisplay"><i class="fab fa-whatsapp"></i> WhatsApp: ---</p>
                <a id="whatsappLink" href="#" class="wa-button"><i class="fab fa-whatsapp"></i> Chat on WhatsApp</a>
            </div>
        </div>
        <div id="projectsList">
            <div class="glass-card" style="text-align: center;">
                <i class="fas fa-spinner fa-pulse"></i> Loading projects...
            </div>
        </div>
    </div>

    <div class="glass-card">
        <button class="btn btn-primary" id="openDashboardBtn">
            <i class="fas fa-lock"></i> Contractor Dashboard
        </button>
        <div id="contractorDash" class="hidden" style="margin-top: 24px;">
            <h3><i class="fas fa-edit"></i> Manage Your Profile</h3>
            <label><i class="fas fa-image"></i> Change Banner Image</label>
            <input type="file" accept="image/*" id="bannerImageInput">
            <hr style="margin: 20px 0;">
            <h3><i class="fas fa-plus-circle"></i> Add New Project</h3>
            <input type="text" id="projectTitle" placeholder="Project Name *">
            <textarea id="projectDesc" placeholder="Project Details" rows="3"></textarea>
            <input type="file" accept="image/*" id="projectImageFile">
            <button class="btn btn-success" id="submitProjectBtn">
                <i class="fas fa-cloud-upload-alt"></i> Post Project
            </button>
        </div>
    </div>

    <div class="footer-links">
        <button onclick="window.location.href='admin.html'">
            <i class="fas fa-crown"></i> Admin Login
        </button>
        <button onclick="showRegisterForm()">
            <i class="fas fa-user-plus"></i> Register Contractor
        </button>
    </div>
</div>

<!-- Registration View -->
<div id="reg-view" class="container hidden">
    <div class="glass-card">
        <h2><i class="fas fa-id-card"></i> Register New Contractor</h2>
        <input type="text" id="regName" placeholder="Full Name *">
        <input type="tel" id="regPhone" placeholder="10-digit WhatsApp Number *">
        <input type="password" id="regPin" placeholder="Set 4-digit PIN *">
        <button class="btn btn-primary" id="registerBtn">
            <i class="fas fa-qrcode"></i> Generate Profile
        </button>
        <button class="btn btn-outline" onclick="hideRegisterForm()">Back</button>
    </div>
</div>

<!-- Success View -->
<div id="success-view" class="container hidden">
    <div class="glass-card" style="text-align: center;">
        <i class="fas fa-check-circle" style="font-size: 70px; color: #10b981;"></i>
        <h2 style="margin: 20px 0;">Profile Created Successfully!</h2>
        <div id="qrContainer" style="display: flex; justify-content: center; margin: 20px 0;"></div>
        <p id="profileLink" style="background: #f3f4f6; padding: 12px; border-radius: 16px; font-size: 12px; word-break: break-all;"></p>
        <button class="btn btn-primary" id="copyLinkBtn"><i class="fas fa-copy"></i> Copy Link</button>
        <button class="btn btn-success" id="viewProfileBtn" style="margin-top: 10px;"><i class="fas fa-eye"></i> View Profile</button>
    </div>
</div>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyAtv8io-eRu0EvNAbIWYrIyjWSQmuDhH8k",
        authDomain: "contrectors-zone-25c0a.firebaseapp.com",
        projectId: "contrectors-zone-25c0a",
        databaseURL: "https://contrectors-zone-25c0a-default-rtdb.firebaseio.com",
        storageBucket: "contrectors-zone-25c0a.appspot.com"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();

    let currentContractorId = new URLSearchParams(window.location.search).get('id');
    let selectedProjectFile = null;
    let selectedBannerFile = null;

    // ========== ADVANCED IMAGE COMPRESSION (30-50KB target) ==========
    function compressImageToTarget(file, maxWidth = 800, targetKB = 50) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    let quality = 0.7;
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > maxWidth) {
                        height = (height * maxWidth) / width;
                        width = maxWidth;
                    }
                    
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // Try to achieve target size (30-50KB)
                    let attempt = 0;
                    let result = null;
                    
                    function tryCompress(qualityLevel) {
                        const dataURL = canvas.toDataURL('image/jpeg', qualityLevel);
                        const sizeInKB = Math.round((dataURL.length * 3/4) / 1024);
                        
                        if (sizeInKB <= targetKB + 20 || attempt >= 5) {
                            result = dataURL;
                            resolve(result);
                        } else if (sizeInKB > targetKB + 20) {
                            attempt++;
                            tryCompress(Math.max(0.2, qualityLevel - 0.1));
                        } else {
                            result = dataURL;
                            resolve(result);
                        }
                    }
                    
                    tryCompress(quality);
                };
                img.onerror = reject;
                img.src = e.target.result;
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    // ========== REAL-TIME PROFILE LOADING ==========
    function loadContractorProfile(contractorId) {
        if (!contractorId) return;
        
        // Real-time listener for contractor data
        db.ref(`contractors/${contractorId}`).on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) {
                document.getElementById('profile-area').innerHTML = '<div class="glass-card">Contractor not found</div>';
                return;
            }
            
            if (data.status === 'OFF') {
                document.getElementById('profile-area').innerHTML = '<div class="glass-card" style="text-align:center; background:#fee;"><i class="fas fa-ban"></i> Profile is Inactive</div>';
                document.getElementById('projectsList').innerHTML = '';
                return;
            }
            
            const profile = data.profile;
            document.getElementById('contractorName').innerText = profile.n;
            document.getElementById('phoneDisplay').innerHTML = `<i class="fab fa-whatsapp"></i> WhatsApp: ${profile.p}`;
            document.getElementById('whatsappLink').href = `https://wa.me/91${profile.p}`;
            if (profile.b) document.getElementById('coverImage').src = profile.b;
        });
        
        // Real-time listener for projects (auto-updates without refresh)
        db.ref(`contractors/${contractorId}/projects`).on('value', (snapshot) => {
            const projects = snapshot.val();
            const projectsDiv = document.getElementById('projectsList');
            
            if (!projects) {
                projectsDiv.innerHTML = '<div class="glass-card" style="text-align:center;">No projects yet</div>';
                return;
            }
            
            // Convert to array and sort by timestamp (newest first)
            const projectsArray = Object.entries(projects).map(([key, value]) => ({ key, ...value }));
            projectsArray.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
            
            let projectsHtml = '';
            projectsArray.forEach(proj => {
                projectsHtml += `
                    <div class="glass-card project-card">
                        <h3><i class="fas fa-hard-hat"></i> ${escapeHtml(proj.t)}</h3>
                        <p>${escapeHtml(proj.d || 'No description')}</p>
                        ${proj.img ? `<img src="${proj.img}" alt="Project" loading="lazy">` : ''}
                        <div class="project-date">
                            <i class="far fa-calendar-alt"></i> ${proj.dt || formatDate(proj.timestamp)}
                        </div>
                    </div>
                `;
            });
            projectsDiv.innerHTML = projectsHtml;
        });
    }

    function formatDate(timestamp) {
        if (!timestamp) return 'Recent';
        const date = new Date(timestamp);
        return date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    // ========== CONTRACTOR DASHBOARD ==========
    document.getElementById('openDashboardBtn')?.addEventListener('click', () => {
        if (!currentContractorId) {
            showToast('Please open contractor profile link first', true);
            return;
        }
        const pin = prompt('Enter your 4-digit PIN:');
        if (!pin) return;
        
        db.ref(`contractors/${currentContractorId}/profile/pin`).once('value', (snap) => {
            if (snap.val() == pin) {
                document.getElementById('contractorDash').classList.remove('hidden');
                showToast('Dashboard unlocked!');
            } else {
                showToast('Wrong PIN!', true);
            }
        });
    });

    // ========== UPLOAD BANNER WITH COMPRESSION ==========
    document.getElementById('bannerImageInput')?.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file || !currentContractorId) return;
        
        // Check file size before processing
        if (file.size > 5 * 1024 * 1024) {
            showToast('Image too large! Max 5MB', true);
            return;
        }
        
        showToast('Compressing image...');
        
        try {
            const compressedBase64 = await compressImageToTarget(file, 800, 50);
            await db.ref(`contractors/${currentContractorId}/profile/b`).set(compressedBase64);
            showToast('Banner updated successfully!');
            document.getElementById('coverImage').src = compressedBase64;
        } catch (error) {
            showToast('Upload failed: ' + error.message, true);
        }
    });

    // ========== POST PROJECT WITH LOADER & ERROR HANDLING ==========
    document.getElementById('projectImageFile')?.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file && file.size > 5 * 1024 * 1024) {
            showToast('Image too large! Max 5MB', true);
            e.target.value = '';
            return;
        }
        selectedProjectFile = file;
    });

    document.getElementById('submitProjectBtn')?.addEventListener('click', async () => {
        if (!currentContractorId) {
            showToast('Contractor ID missing', true);
            return;
        }
        
        const title = document.getElementById('projectTitle').value.trim();
        const desc = document.getElementById('projectDesc').value.trim();
        
        if (!title) {
            showToast('Project title required', true);
            return;
        }
        
        if (!selectedProjectFile) {
            showToast('Please select a project image', true);
            return;
        }
        
        const submitBtn = document.getElementById('submitProjectBtn');
        const originalHTML = submitBtn.innerHTML;
        
        // Show loading state
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner"></span> Uploading Project...';
        
        try {
            // Compress image to 30-50KB
            const compressedBase64 = await compressImageToTarget(selectedProjectFile, 800, 50);
            const timestamp = Date.now();
            const dateString = new Date(timestamp).toLocaleDateString('en-IN');
            
            const newProject = {
                t: title,
                d: desc || 'No description',
                img: compressedBase64,
                dt: dateString,
                timestamp: timestamp
            };
            
            await db.ref(`contractors/${currentContractorId}/projects`).push(newProject);
            
            // Reset form
            document.getElementById('projectTitle').value = '';
            document.getElementById('projectDesc').value = '';
            document.getElementById('projectImageFile').value = '';
            selectedProjectFile = null;
            
            showToast('Project posted successfully!');
            
        } catch (error) {
            console.error('Upload error:', error);
            showToast('Upload failed! Please check your internet connection', true);
        } finally {
            // Reset button state
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalHTML;
        }
    });

    // ========== REGISTER NEW CONTRACTOR ==========
    document.getElementById('registerBtn')?.addEventListener('click', async () => {
        const name = document.getElementById('regName').value.trim();
        const phone = document.getElementById('regPhone').value.trim();
        const pin = document.getElementById('regPin').value.trim();
        
        if (!name || !phone || !pin) {
            showToast('All fields required', true);
            return;
        }
        
        if (!/^\d{10}$/.test(phone)) {
            showToast('Valid 10-digit phone required', true);
            return;
        }
        
        if (!/^\d{4}$/.test(pin)) {
            showToast('PIN must be 4 digits', true);
            return;
        }
        
        const registerBtn = document.getElementById('registerBtn');
        const originalHTML = registerBtn.innerHTML;
        registerBtn.disabled = true;
        registerBtn.innerHTML = '<span class="spinner"></span> Creating Profile...';
        
        try {
            const defaultBanner = 'https://images.unsplash.com/photo-1541888946425-d81bb19480c5?w=800';
            const timestamp = Date.now();
            
            await db.ref(`contractors/${phone}`).set({
                profile: { 
                    n: name, 
                    p: phone, 
                    pin: pin, 
                    b: defaultBanner,
                    createdAt: timestamp
                },
                status: 'ON',
                projects: null
            });
            
            const link = `${window.location.origin}${window.location.pathname}?id=${phone}`;
            document.getElementById('profileLink').innerText = link;
            document.getElementById('qrContainer').innerHTML = '';
            new QRCode(document.getElementById('qrContainer'), { text: link, width: 180, height: 180 });
            
            document.getElementById('copyLinkBtn').onclick = () => {
                navigator.clipboard.writeText(link);
                showToast('Link copied!');
            };
            
            document.getElementById('viewProfileBtn').onclick = () => {
                window.location.href = link;
            };
            
            toggleView('success-view');
            
        } catch (error) {
            showToast('Registration failed: ' + error.message, true);
        } finally {
            registerBtn.disabled = false;
            registerBtn.innerHTML = originalHTML;
        }
    });

    // ========== HELPER FUNCTIONS ==========
    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${message}`;
        toast.style.background = isError ? '#dc2626' : '#10b981';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function toggleView(viewId) {
        document.querySelectorAll('.container').forEach(div => div.classList.add('hidden'));
        document.getElementById(viewId).classList.remove('hidden');
    }

    function showRegisterForm() {
        toggleView('reg-view');
    }

    function hideRegisterForm() {
        toggleView('main-view');
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Initialize
    if (currentContractorId) {
        loadContractorProfile(currentContractorId);
    } else {
        document.getElementById('profile-area').innerHTML = '<div class="glass-card" style="text-align:center;"><i class="fas fa-building"></i><br>Select a contractor or register new</div>';
        document.getElementById('projectsList').innerHTML = '';
    }
</script>
</body>
</html>
