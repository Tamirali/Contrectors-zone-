<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contractors Work Zone - Admin Fixed</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --accent: #25d366; --dark: #121212; --danger: #ff4444; --blue: #007bff; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        .container { max-width: 500px; margin: auto; padding-bottom: 80px; }
        .card { background: white; border-radius: 15px; padding: 15px; margin: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* Banner Design */
        .banner-wrap { position: relative; width: 100%; height: 250px; background: #000; overflow: hidden; color: white; }
        .banner-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .banner-info { position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); box-sizing: border-box; text-align: center; }
        
        /* Buttons */
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-green { background: var(--accent); color: white; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-dark { background: #333; color: white; }
        
        input, textarea { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .hidden { display: none; }

        /* Admin Dashboard List */
        .admin-box { background: #fff; border: 2px solid var(--blue); border-radius: 15px; padding: 15px; margin: 10px; }
        .contractor-row { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; flex-direction: column; gap: 5px; }
        .row-actions { display: flex; gap: 5px; margin-top: 5px; }
        .status-badge { font-size: 10px; padding: 2px 6px; border-radius: 10px; text-transform: uppercase; font-weight: bold; }
        .on { background: #e1ffed; color: #25d366; }
        .off { background: #ffe1e1; color: #ff4444; }
    </style>
</head>
<body>

<div id="main-view" class="container">
    <div id="profile-area">
        <div class="banner-wrap">
            <img id="outB" class="banner-img" src="https://images.unsplash.com/photo-1541888946425-d81bb19480c5?q=80&w=800">
            <div class="banner-info">
                <h1 id="outN" style="margin:0;">Contractor Name</h1>
                <p id="outP_Text" style="color:var(--accent);">WhatsApp: Loading...</p>
                <a id="waBtn" href="#" class="btn btn-green" style="display:inline-block; width:auto; padding:5px 15px;">WhatsApp Chat</a>
            </div>
        </div>
        <div id="project-feed" style="padding:10px;"></div>
    </div>

    <div class="card">
        <button class="btn btn-blue" onclick="openDashboard()">Contractor Dashboard (Login)</button>
        <div id="contractor-dashboard" class="hidden" style="margin-top:15px; background:#f9f9f9; padding:15px; border-radius:10px;">
            <h4>Manage My Profile</h4>
            <label>Change Banner:</label>
            <input type="file" accept="image/*" onchange="compressImg(this, 'banner')">
            <hr>
            <label>Add Project:</label>
            <input type="text" id="pTitle" placeholder="Project Name">
            <textarea id="pDesc" placeholder="Project Details"></textarea>
            <input type="file" accept="image/*" onchange="compressImg(this, 'project')">
            <button class="btn btn-green" onclick="saveProject()">Post Project</button>
        </div>
    </div>

    <div style="text-align:center; padding:10px;">
        <button onclick="openAdmin()" style="color:var(--blue); border:none; background:none; cursor:pointer;">Master Admin Login</button> | 
        <button onclick="toggleView('reg-view')" style="color:#333; border:none; background:none; cursor:pointer;">Register New</button>
    </div>
</div>

<div id="admin-view" class="container hidden">
    <div class="admin-box">
        <h2 style="margin-top:0;">Master Admin</h2>
        <p style="font-size:12px; color:#666;">Sare contractors yahan dikhenge:</p>
        <div id="admin-list">Loading list...</div>
        <button class="btn btn-dark" onclick="location.reload()">Exit Admin</button>
    </div>
</div>

<div id="reg-view" class="container hidden">
    <div class="card">
        <h3>Create New Profile</h3>
        <input type="text" id="regN" placeholder="Full Name">
        <input type="number" id="regP" placeholder="10 Digit WhatsApp No">
        <input type="password" id="regPin" placeholder="Set 4-Digit PIN">
        <button class="btn btn-green" onclick="handleRegister()">Generate Link & QR</button>
        <button class="btn btn-dark" onclick="location.reload()">Back</button>
    </div>
</div>

<div id="success-view" class="container hidden" style="text-align:center;">
    <div class="card">
        <h2 style="color:green;">Profile Live!</h2>
        <div id="qrcode" style="display:flex; justify-content:center; margin:15px;"></div>
        <p id="shareLink" style="font-size:12px; word-break:break-all; background:#eee; padding:10px;"></p>
        <button class="btn btn-blue" onclick="copyLink()">Copy Link</button>
        <button class="btn btn-green" id="viewProf">View Profile</button>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyAtv8io-eRu0EvNAbIWYrIyjWSQmuDhH8k",
        authDomain: "contrectors-zone-25c0a.firebaseapp.com",
        projectId: "contrectors-zone-25c0a",
        databaseURL: "https://contrectors-zone-25c0a-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let curId = new URLSearchParams(window.location.search).get('id');
    let tempProjectImg = "";

    function toggleView(id) {
        document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    // --- Image Logic ---
    function compressImg(input, type) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 600; canvas.height = img.height * (600 / img.width);
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                const data = canvas.toDataURL('image/jpeg', 0.5);
                if(type === 'banner') db.ref('contractors/' + curId + '/profile/b').set(data).then(() => alert("Banner Updated!"));
                else tempProjectImg = data;
            };
        };
        reader.readAsDataURL(file);
    }

    // --- Admin Functions ---
    function openAdmin() {
        const pass = prompt("Admin Password:");
        if(pass !== "tamir@00769") return alert("Access Denied!");
        toggleView('admin-view');
        
        // Load all contractors
        db.ref('contractors').on('value', snap => {
            const data = snap.val();
            let html = "";
            if(!data) {
                html = "No contractors registered.";
            } else {
                for(let id in data) {
                    const c = data[id].profile;
                    const status = data[id].status || 'ON';
                    html += `
                        <div class="contractor-row">
                            <span><b>${c.n}</b> (${id}) <span class="status-badge ${status.toLowerCase()}">${status}</span></span>
                            <div class="row-actions">
                                <button class="btn-blue" style="padding:4px 8px; font-size:11px;" onclick="toggleStatus('${id}', '${status}')">ON/OFF</button>
                                <button class="btn-danger" style="padding:4px 8px; font-size:11px;" onclick="deleteContractor('${id}')">DELETE</button>
                                <button class="btn-dark" style="padding:4px 8px; font-size:11px;" onclick="window.location.href='?id=${id}'">View</button>
                            </div>
                        </div>`;
                }
            }
            document.getElementById('admin-list').innerHTML = html;
        });
    }

    function toggleStatus(id, current) {
        const next = current === 'ON' ? 'OFF' : 'ON';
        db.ref('contractors/' + id + '/status').set(next);
    }

    function deleteContractor(id) {
        if(confirm("Are you sure? Is contractor ka sara data delete ho jayega!")) {
            db.ref('contractors/' + id).remove();
        }
    }

    // --- Core Logic ---
    function handleRegister() {
        const n = document.getElementById('regN').value, p = document.getElementById('regP').value, pin = document.getElementById('regPin').value;
        if(!n || p.length < 10 || !pin) return alert("Details bharein!");
        db.ref('contractors/' + p).set({
            profile: { n, p, pin, b: "https://images.unsplash.com/photo-1541888946425-d81bb19480c5?q=80&w=800" },
            status: 'ON'
        }).then(() => {
            const link = window.location.origin + window.location.pathname + "?id=" + p;
            document.getElementById('shareLink').innerText = link;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), link);
            document.getElementById('viewProf').onclick = () => window.location.href = link;
            toggleView('success-view');
        });
    }

    function openDashboard() {
        if(!curId) return alert("Pehle contractor link open karein!");
        const pin = prompt("Enter PIN:");
        db.ref('contractors/' + curId + '/profile/pin').once('value', s => {
            if(s.val() === pin) document.getElementById('contractor-dashboard').classList.remove('hidden');
            else alert("Wrong PIN!");
        });
    }

    function saveProject() {
        const t = document.getElementById('pTitle').value, d = document.getElementById('pDesc').value;
        if(!t || !tempProjectImg) return alert("Image and Title required!");
        db.ref('contractors/' + curId + '/projects').push({ t, d, img: tempProjectImg, dt: new Date().toLocaleDateString() })
        .then(() => { alert("Project Added!"); location.reload(); });
    }

    function init() {
        if(curId) {
            db.ref('contractors/' + curId).on('value', snap => {
                const data = snap.val();
                if(!data || data.status === 'OFF') {
                    document.getElementById('profile-area').innerHTML = "<div class='card' style='text-align:center;'><h3>Profile Inactive</h3><p>Ye account admin ne band kiya hai.</p></div>";
                    return;
                }
                document.getElementById('outN').innerText = data.profile.n;
                document.getElementById('outP_Text').innerText = "WhatsApp: " + data.profile.p;
                document.getElementById('waBtn').href = "https://wa.me/91" + data.profile.p;
                document.getElementById('outB').src = data.profile.b;
                let html = "";
                if(data.projects) {
                    Object.values(data.projects).reverse().forEach(p => {
                        html += `<div class="card">
                            <h4 style="margin:0;">${p.t}</h4>
                            <p style="font-size:12px; color:#666;">${p.d}</p>
                            <img src="${p.img}" style="width:100%; border-radius:10px;">
                        </div>`;
                    });
                }
                document.getElementById('project-feed').innerHTML = html || "<p style='text-align:center;'>No projects uploaded yet.</p>";
            });
        }
    }

    function copyLink() {
        navigator.clipboard.writeText(document.getElementById('shareLink').innerText);
        alert("Link Copied!");
    }

    window.onload = init;
</script>
</body>
</html>
