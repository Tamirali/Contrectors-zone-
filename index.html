<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contractors Work Zone - Professional</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --accent: #25d366; --dark: #121212; --danger: #ff4444; --blue: #007bff; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        .container { max-width: 500px; margin: auto; padding-bottom: 80px; }
        .card { background: white; border-radius: 15px; padding: 15px; margin: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* Banner Design */
        .banner-wrap { position: relative; width: 100%; height: 250px; background: #000; overflow: hidden; color: white; }
        .banner-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .banner-info { position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); box-sizing: border-box; text-align: center; }
        .banner-info h1 { margin: 0; font-size: 26px; text-transform: uppercase; }
        .banner-info p { margin: 5px 0; font-weight: bold; color: var(--accent); }

        /* Buttons & Inputs */
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-green { background: var(--accent); color: white; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-dark { background: #333; color: white; }
        input, textarea { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        
        .project-card { margin-top: 15px; border-top: 2px solid #eee; padding-top: 10px; }
        .project-img { width: 100%; border-radius: 10px; margin-top: 8px; }
        .hidden { display: none; }
        
        /* Admin/Contractor UI */
        .mgmt-panel { border: 2px dashed var(--blue); padding: 15px; margin-top: 20px; border-radius: 15px; background: #f0f8ff; }
        .admin-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>

<div id="main-view" class="container">
    <div id="profile-area">
        <div class="banner-wrap">
            <img id="outB" class="banner-img" src="https://images.unsplash.com/photo-1541888946425-d81bb19480c5?q=80&w=800">
            <div class="banner-info">
                <h1 id="outN">Loading...</h1>
                <p id="outP_Text">WhatsApp: --</p>
                <a id="waBtn" href="#" class="btn btn-green" style="display:inline-block; width:auto; padding:5px 15px;">Chat on WhatsApp</a>
            </div>
        </div>
        
        <div id="project-feed" style="padding:10px;"></div>
    </div>

    <div class="card">
        <button class="btn btn-blue" onclick="openDashboard()">Contractor Login (Add Projects/Change Banner)</button>
        
        <div id="contractor-dashboard" class="mgmt-panel hidden">
            <h3>Contractor Dashboard</h3>
            <p style="font-size:12px; color:red;">* Change Banner Photo</p>
            <input type="file" accept="image/*" onchange="compressImg(this, 'banner')">
            <hr>
            <p style="font-size:12px; color:blue;">* Add New Project</p>
            <input type="text" id="pTitle" placeholder="Project Naam">
            <textarea id="pDesc" placeholder="Project Details..."></textarea>
            <input type="file" accept="image/*" onchange="compressImg(this, 'project')">
            <button class="btn btn-green" onclick="saveProject()">Upload Project</button>
            <button class="btn btn-dark" onclick="this.parentElement.classList.add('hidden')">Close Dashboard</button>
        </div>
    </div>

    <div style="text-align:center; padding:20px;">
        <button onclick="openAdmin()" style="border:none; background:none; color:blue; text-decoration:underline;">Admin Login</button>
        <button class="btn btn-dark" onclick="toggleView('reg-view')">Register New Contractor</button>
    </div>
</div>

<div id="reg-view" class="container hidden" style="padding:20px;">
    <div class="card">
        <h2>New Registration</h2>
        <input type="text" id="regN" placeholder="Full Name">
        <input type="number" id="regP" placeholder="WhatsApp Number">
        <input type="password" id="regPin" placeholder="Set 4-Digit PIN">
        <button class="btn btn-green" onclick="handleRegister()">Generate Profile & QR</button>
        <button class="btn" onclick="location.reload()">Back</button>
    </div>
</div>

<div id="success-view" class="container hidden" style="text-align:center; padding:20px;">
    <div class="card">
        <h2 style="color:green;">Profile Ready!</h2>
        <div id="qrcode" style="display:flex; justify-content:center; margin:20px;"></div>
        <p id="shareLink" style="word-break:break-all; background:#eee; padding:10px;"></p>
        <button class="btn btn-blue" onclick="copyLink()">Copy Profile Link</button>
        <button class="btn btn-green" id="viewProf">Open My Profile</button>
    </div>
</div>

<div id="admin-view" class="container hidden" style="padding:20px;">
    <div class="card">
        <h2>Master Admin Panel</h2>
        <div id="admin-list"></div>
        <button class="btn btn-dark" onclick="location.reload()">Exit Admin</button>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyAtv8io-eRu0EvNAbIWYrIyjWSQmuDhH8k",
        authDomain: "contrectors-zone-25c0a.firebaseapp.com",
        projectId: "contrectors-zone-25c0a",
        databaseURL: "https://contrectors-zone-25c0a-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let curId = new URLSearchParams(window.location.search).get('id');
    let tempBanner = "", tempProjectImg = "";

    function toggleView(id) {
        document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    // --- Image Compression ---
    function compressImg(input, type) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 600; canvas.height = img.height * (600 / img.width);
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                const data = canvas.toDataURL('image/jpeg', 0.6);
                if(type === 'banner') {
                    updateBanner(data);
                } else {
                    tempProjectImg = data;
                }
            };
        };
        reader.readAsDataURL(file);
    }

    // --- Contractor Logic ---
    function handleRegister() {
        const n = document.getElementById('regN').value, p = document.getElementById('regP').value, pin = document.getElementById('regPin').value;
        if(!n || p.length < 10 || !pin) return alert("Sari details bharein!");

        db.ref('contractors/' + p).set({
            profile: { n, p, pin, b: "https://images.unsplash.com/photo-1541888946425-d81bb19480c5?q=80&w=800" },
            status: 'ON'
        }).then(() => {
            const link = window.location.origin + window.location.pathname + "?id=" + p;
            document.getElementById('shareLink').innerText = link;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), link);
            document.getElementById('viewProf').onclick = () => window.location.href = link;
            toggleView('success-view');
        });
    }

    function openDashboard() {
        if(!curId) return alert("Pehle apni profile link open karein!");
        const pin = prompt("Apna Security PIN Dalein:");
        db.ref('contractors/' + curId + '/profile/pin').once('value', s => {
            if(s.val() === pin) document.getElementById('contractor-dashboard').classList.remove('hidden');
            else alert("Galat PIN!");
        });
    }

    function updateBanner(data) {
        db.ref('contractors/' + curId + '/profile/b').set(data).then(() => alert("Banner Updated!"));
    }

    function saveProject() {
        const t = document.getElementById('pTitle').value, d = document.getElementById('pDesc').value;
        if(!t || !tempProjectImg) return alert("Title aur Image zaruri hai!");
        
        db.ref('contractors/' + curId + '/projects').push({ t, d, img: tempProjectImg, dt: new Date().toLocaleDateString() })
        .then(() => {
            alert("Project Added!");
            location.reload();
        });
    }

    // --- Rendering ---
    function init() {
        if(curId) {
            db.ref('contractors/' + curId).on('value', snap => {
                const data = snap.val();
                if(!data || data.status === 'OFF') {
                    document.getElementById('profile-area').innerHTML = "<h2 style='text-align:center; padding:50px;'>Profile Inactive ya Blocked hai.</h2>";
                    return;
                }
                document.getElementById('outN').innerText = data.profile.n;
                document.getElementById('outP_Text').innerText = "WhatsApp: " + data.profile.p;
                document.getElementById('waBtn').href = "https://wa.me/91" + data.profile.p;
                document.getElementById('outB').src = data.profile.b;

                let html = "";
                if(data.projects) {
                    Object.values(data.projects).reverse().forEach(p => {
                        html += `<div class="card project-card">
                            <h4>${p.t}</h4>
                            <p style="font-size:13px; color:#666;">${p.d}</p>
                            <img src="${p.img}" class="project-img">
                            <small style="color:#999;">Uploaded on: ${p.dt}</small>
                        </div>`;
                    });
                }
                document.getElementById('project-feed').innerHTML = html || "<p style='text-align:center;'>No projects yet.</p>";
            });
        } else {
            document.getElementById('outN').innerText = "Contractor Zone Main";
        }
    }

    // --- Admin Panel ---
    function openAdmin() {
        const pass = prompt("Admin Password:");
        if(pass !== "tamir@00769") return alert("Wrong Password!");
        toggleView('admin-view');
        db.ref('contractors').on('value', snap => {
            const list = snap.val();
            let html = "";
            for(let id in list) {
                html += `<div class="admin-item">
                    <span><b>${list[id].profile.n}</b> (${id}) - [${list[id].status}]</span>
                    <div>
                        <button onclick="db.ref('contractors/${id}/status').set('${list[id].status === 'ON' ? 'OFF' : 'ON'}')">Toggle</button>
                        <button onclick="if(confirm('Delete?')) db.ref('contractors/${id}').remove()" style="color:red;">Del</button>
                    </div>
                </div>`;
            }
            document.getElementById('admin-list').innerHTML = html;
        });
    }

    function copyLink() {
        navigator.clipboard.writeText(document.getElementById('shareLink').innerText);
        alert("Link Copied!");
    }

    window.onload = init;
</script>
</body>
</html>
