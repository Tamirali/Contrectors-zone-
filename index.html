<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin Panel | Contractor Control Hub</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- Font Awesome 6 (Free Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f0f5fb 0%, #e9eef3 100%);
            padding: 24px 16px 48px;
            min-height: 100vh;
        }

        /* custom scroll */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 10px;
        }

        .container {
            max-width: 580px;
            margin: 0 auto;
            transition: all 0.2s ease;
        }

        .hidden {
            display: none !important;
        }

        /* modern card */
        .glass-card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(0px);
            border-radius: 32px;
            padding: 20px 22px;
            margin-bottom: 20px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08), 0 1px 2px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(255,255,255,0.6);
            transition: transform 0.2s;
        }

        /* banner area */
        .hero-banner {
            position: relative;
            width: 100%;
            height: 240px;
            border-radius: 32px;
            overflow: hidden;
            margin-bottom: 8px;
            box-shadow: 0 12px 28px -8px rgba(0, 0, 0, 0.2);
        }
        .hero-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        .banner-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, #0b1120dd, transparent);
            padding: 20px 18px 18px;
            color: white;
            text-align: center;
        }
        .banner-overlay h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .wa-badge {
            background: #25D366;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border-radius: 60px;
            padding: 8px 18px;
            font-weight: 600;
            font-size: 0.85rem;
            color: white;
            margin-top: 8px;
            text-decoration: none;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(37,211,102,0.3);
        }
        .wa-badge i {
            font-size: 1.1rem;
        }

        /* buttons modern */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            border: none;
            border-radius: 60px;
            padding: 12px 20px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #f1f5f9;
            color: #1e293b;
        }
        .btn-primary {
            background: #1e3a8a;
            color: white;
            box-shadow: 0 4px 8px rgba(30,58,138,0.2);
        }
        .btn-primary:hover { background: #1e40af; transform: translateY(-1px);}
        .btn-success {
            background: #10b981;
            color: white;
            box-shadow: 0 4px 8px rgba(16,185,129,0.2);
        }
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #cbd5e1;
            color: #334155;
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 0.75rem;
            width: auto;
        }

        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 48px;
            font-size: 0.9rem;
            background: white;
            transition: 0.2s;
            margin: 8px 0 12px;
        }
        textarea {
            border-radius: 24px;
            resize: vertical;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }

        /* admin contractor row (beautiful) */
        .contractor-item {
            background: #f8fafc;
            border-radius: 28px;
            padding: 16px;
            margin-bottom: 16px;
            transition: all 0.2s;
            border: 1px solid #eef2ff;
        }
        .contractor-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .contractor-name {
            font-weight: 800;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status-chip {
            font-size: 0.65rem;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 40px;
            background: #e2e8f0;
        }
        .active-chip {
            background: #d1fae5;
            color: #065f46;
        }
        .inactive-chip {
            background: #fee2e2;
            color: #991b1b;
        }
        .action-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .icon-btn {
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .icon-btn-danger {
            background: #fff0f0;
            border-color: #fecaca;
            color: #b91c1c;
        }
        .project-img {
            width: 100%;
            max-height: 220px;
            object-fit: cover;
            border-radius: 24px;
            margin-top: 12px;
            border: 1px solid #eef2ff;
        }
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 12px;
        }
        .footer-links button {
            background: none;
            border: none;
            font-weight: 600;
            color: #2563eb;
            cursor: pointer;
            font-size: 0.85rem;
        }
        hr {
            margin: 16px 0;
            border: none;
            height: 2px;
            background: linear-gradient(to right, #e2e8f0, transparent);
        }
        .badge-icon {
            background: #f1f5f9;
            border-radius: 30px;
            padding: 2px 12px;
            font-size: 12px;
            font-weight: 500;
        }
        i {
            margin-right: 4px;
        }
    </style>
</head>
<body>

<!-- MAIN VIEW (Contractor Profile Public) -->
<div id="main-view" class="container">
    <div id="profileDynamicArea">
        <!-- dynamic banner & projects will load -->
        <div class="hero-banner" id="bannerWrap">
            <img id="coverImage" src="https://images.unsplash.com/photo-1541888946425-d81bb19480c5?w=700" alt="cover">
            <div class="banner-overlay">
                <h1 id="contractorName">Loading...</h1>
                <p id="phoneDisplay" style="margin: 4px 0;"><i class="fab fa-whatsapp"></i> WhatsApp: ---</p>
                <a id="whatsappLink" href="#" class="wa-badge"><i class="fab fa-whatsapp"></i> Chat Now</a>
            </div>
        </div>
        <div id="projectsList" style="margin-top: 12px;"></div>
    </div>

    <div class="glass-card">
        <button class="btn btn-primary" id="openDashboardBtn"><i class="fas fa-lock"></i> Contractor Dashboard (Login with PIN)</button>
        <div id="contractorDash" class="hidden" style="margin-top: 20px;">
            <h4 style="display: flex; gap: 8px;"><i class="fas fa-edit"></i> Manage Your Profile</h4>
            <label><i class="fas fa-image"></i> Change Banner Image</label>
            <input type="file" accept="image/*" id="bannerImageInput">
            <hr>
            <label><i class="fas fa-plus-circle"></i> Add New Project</label>
            <input type="text" id="projectTitle" placeholder="Project name">
            <textarea id="projectDesc" placeholder="Project details, work description..." rows="2"></textarea>
            <input type="file" accept="image/*" id="projectImageFile">
            <button class="btn btn-success" id="submitProjectBtn"><i class="fas fa-cloud-upload-alt"></i> Post Project</button>
        </div>
    </div>

    <div class="footer-links">
        <button onclick="openAdminMaster()"><i class="fas fa-crown"></i> Master Admin</button>
        <button onclick="toggleRegView()"><i class="fas fa-user-plus"></i> Register New Contractor</button>
    </div>
</div>

<!-- ADMIN PANEL VIEW -->
<div id="admin-view" class="container hidden">
    <div class="glass-card">
        <h2 style="margin:0 0 6px;"><i class="fas fa-shield-alt"></i> Master Admin Control</h2>
        <p style="color:#475569; font-size: 0.8rem;">ON/OFF or DELETE any contractor — full authority</p>
        <div id="adminContractorsList" style="margin: 20px 0;">Loading contractors...</div>
        <button class="btn btn-outline" onclick="exitAdminView()"><i class="fas fa-arrow-left"></i> Exit Admin</button>
    </div>
</div>

<!-- REGISTER NEW CONTRACTOR VIEW -->
<div id="reg-view" class="container hidden">
    <div class="glass-card">
        <h3><i class="fas fa-id-card"></i> Create Contractor Profile</h3>
        <input type="text" id="regFullName" placeholder="Full Name (e.g. Ramesh Constructions)">
        <input type="tel" id="regPhone" placeholder="10-digit WhatsApp number">
        <input type="password" id="regPinCode" placeholder="Set 4-digit secret PIN">
        <button class="btn btn-primary" id="doRegisterBtn"><i class="fas fa-qrcode"></i> Generate Link & QR</button>
        <button class="btn btn-outline" onclick="toggleMainFromReg()" style="margin-top: 8px;">Back to Home</button>
    </div>
</div>

<!-- SUCCESS VIEW (QR + LINK) -->
<div id="success-view" class="container hidden">
    <div class="glass-card" style="text-align: center;">
        <i class="fas fa-check-circle" style="font-size: 48px; color: #10b981;"></i>
        <h2 style="margin: 12px 0;">Profile Live!</h2>
        <div id="qrCodeContainer" style="display: flex; justify-content: center; margin: 16px 0;"></div>
        <p id="shareableLink" style="background: #f1f5f9; padding: 12px; border-radius: 60px; font-size: 12px; word-break: break-all;"></p>
        <div style="display: flex; gap: 12px;">
            <button class="btn btn-primary" id="copyFinalLinkBtn" style="flex:1;"><i class="fas fa-copy"></i> Copy Link</button>
            <button class="btn btn-success" id="viewProfileFinalBtn" style="flex:1;"><i class="fas fa-eye"></i> View Profile</button>
        </div>
        <button class="btn btn-outline" id="homeAfterRegBtn" style="margin-top: 16px;">Go to Home</button>
    </div>
</div>

<script>
    // ----------------------------- FIREBASE -----------------------------
    const firebaseConfig = {
        apiKey: "AIzaSyAtv8io-eRu0EvNAbIWYrIyjWSQmuDhH8k",
        authDomain: "contrectors-zone-25c0a.firebaseapp.com",
        projectId: "contrectors-zone-25c0a",
        databaseURL: "https://contrectors-zone-25c0a-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentContractorId = new URLSearchParams(window.location.search).get('id');
    let tempProjectImage = "";     // base64
    let tempBannerImage = "";

    // Helper: compress image to base64
    function compressImage(file, callback) {
        if (!file) return callback(null);
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let width = 700;
                let height = (img.height / img.width) * width;
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                const base64 = canvas.toDataURL('image/jpeg', 0.75);
                callback(base64);
            };
            img.onerror = () => callback(null);
        };
        reader.onerror = () => callback(null);
        reader.readAsDataURL(file);
    }

    // -------- UI Helpers ----------
    function showToastMessage(msg, isError = false) {
        let toastDiv = document.createElement('div');
        toastDiv.innerText = msg;
        toastDiv.style.position = 'fixed';
        toastDiv.style.bottom = '22px';
        toastDiv.style.left = '50%';
        toastDiv.style.transform = 'translateX(-50%)';
        toastDiv.style.backgroundColor = isError ? '#b91c1c' : '#0f3b2c';
        toastDiv.style.color = 'white';
        toastDiv.style.padding = '10px 20px';
        toastDiv.style.borderRadius = '60px';
        toastDiv.style.fontSize = '13px';
        toastDiv.style.fontWeight = '500';
        toastDiv.style.zIndex = '9999';
        toastDiv.style.boxShadow = '0 10px 20px rgba(0,0,0,0.2)';
        toastDiv.style.backdropFilter = 'blur(4px)';
        document.body.appendChild(toastDiv);
        setTimeout(() => toastDiv.remove(), 2800);
    }

    function toggleView(viewId) {
        document.querySelectorAll('.container').forEach(div => div.classList.add('hidden'));
        document.getElementById(viewId).classList.remove('hidden');
    }

    function toggleRegView() {
        toggleView('reg-view');
    }
    function toggleMainFromReg() {
        toggleView('main-view');
        if (currentContractorId) {
            loadContractorProfile(currentContractorId);
        } else {
            document.getElementById('profileDynamicArea').innerHTML = `<div class="glass-card" style="text-align:center;"><i class="fas fa-hard-hat"></i> <strong>No contractor selected</strong><br>Use admin link or register new.</div>`;
        }
    }

    // ---------- ADMIN FUNCTIONS (ON/OFF & DELETE WORKING) --------------
    window.adminToggleStatus = function(contrId, currentStatus) {
        const newStatus = currentStatus === 'ON' ? 'OFF' : 'ON';
        db.ref(`contractors/${contrId}/status`).set(newStatus).then(() => {
            showToastMessage(`Contractor ${newStatus === 'ON' ? 'ACTIVATED ✅' : 'DEACTIVATED ⛔'}`);
        }).catch(err => alert("Error: " + err));
    };

    window.adminDeleteContractor = function(contrId) {
        if (confirm(`⚠️ PERMANENT DELETE: This will erase all projects and data of contractor ${contrId}. Are you 100% sure?`)) {
            db.ref(`contractors/${contrId}`).remove().then(() => {
                showToastMessage("Contractor deleted permanently!");
            }).catch(err => alert("Delete failed: " + err));
        }
    };

    function openAdminMaster() {
        const pass = prompt("🔐 Master Admin Password:");
        if (pass !== "tamir@00769") {
            showToastMessage("Access denied! Wrong password", true);
            return;
        }
        toggleView('admin-view');
        loadAllContractorsAdmin();
    }

    function loadAllContractorsAdmin() {
        const container = document.getElementById('adminContractorsList');
        container.innerHTML = '<div style="text-align:center;"><i class="fas fa-spinner fa-pulse"></i> Fetching contractors...</div>';
        db.ref('contractors').on('value', (snapshot) => {
            const all = snapshot.val();
            if (!all) {
                container.innerHTML = '<div class="glass-card" style="text-align:center;">🤝 No contractors registered yet.</div>';
                return;
            }
            let html = '';
            for(let id in all) {
                const profile = all[id].profile || {};
                const name = profile.n || 'Unnamed';
                const phone = profile.p || 'N/A';
                const status = all[id].status || 'ON';
                html += `
                    <div class="contractor-item">
                        <div class="contractor-header">
                            <div>
                                <div class="contractor-name"><i class="fas fa-user-hard-hat"></i> ${escapeHtml(name)}</div>
                                <div style="font-size: 11px; color:#475569;">ID: ${id} | 📞 ${phone}</div>
                            </div>
                            <span class="status-chip ${status === 'ON' ? 'active-chip' : 'inactive-chip'}">${status === 'ON' ? '🟢 ACTIVE' : '🔴 INACTIVE'}</span>
                        </div>
                        <div class="action-group">
                            <button class="icon-btn" onclick="adminToggleStatus('${id}', '${status}')"><i class="fas fa-power-off"></i> Turn ${status === 'ON' ? 'OFF' : 'ON'}</button>
                            <button class="icon-btn icon-btn-danger" onclick="adminDeleteContractor('${id}')"><i class="fas fa-trash-alt"></i> DELETE</button>
                            <button class="icon-btn" onclick="window.location.href='?id=${id}'"><i class="fas fa-external-link-alt"></i> View</button>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        });
    }

    function exitAdminView() {
        window.location.href = window.location.pathname;  // reload without admin view
    }

    // ---------- Public Contractor Profile Load ----------
    function loadContractorProfile(contractorId) {
        if (!contractorId) return;
        db.ref(`contractors/${contractorId}`).on('value', (snap) => {
            const data = snap.val();
            if (!data) {
                document.getElementById('profileDynamicArea').innerHTML = `<div class="glass-card" style="text-align:center;"><i class="fas fa-exclamation-triangle"></i> Contractor not found or removed.</div>`;
                document.getElementById('projectsList').innerHTML = '';
                return;
            }
            if (data.status === 'OFF') {
                document.getElementById('profileDynamicArea').innerHTML = `<div class="glass-card" style="text-align:center; background:#fff0f0;"><i class="fas fa-ban"></i> <strong>Profile is INACTIVE</strong><br>This contractor has been disabled by admin.</div>`;
                document.getElementById('projectsList').innerHTML = '';
                return;
            }
            const profile = data.profile;
            document.getElementById('contractorName').innerText = profile.n || 'Contractor';
            document.getElementById('phoneDisplay').innerHTML = `<i class="fab fa-whatsapp"></i> WhatsApp: ${profile.p || ''}`;
            document.getElementById('whatsappLink').href = `https://wa.me/91${profile.p || ''}`;
            if (profile.b && (profile.b.startsWith('http') || profile.b.startsWith('data:image'))) {
                document.getElementById('coverImage').src = profile.b;
            } else {
                document.getElementById('coverImage').src = "https://images.unsplash.com/photo-1541888946425-d81bb19480c5?w=700";
            }
            // load projects
            loadProjectsRealTime(contractorId);
        });
    }

    function loadProjectsRealTime(contractorId) {
        db.ref(`contractors/${contractorId}/projects`).on('value', (snap) => {
            const projects = snap.val();
            const projectsDiv = document.getElementById('projectsList');
            if (!projects) {
                projectsDiv.innerHTML = `<div class="glass-card" style="text-align:center;"><i class="fas fa-folder-open"></i> No projects uploaded yet.</div>`;
                return;
            }
            let projHtml = '';
            const projectsArr = Object.values(projects).reverse();
            projectsArr.forEach(proj => {
                projHtml += `
                    <div class="glass-card" style="margin-bottom: 16px;">
                        <h3 style="margin-bottom: 4px;"><i class="fas fa-hard-hat"></i> ${escapeHtml(proj.t)}</h3>
                        <p style="color: #334155; font-size: 0.85rem;">${escapeHtml(proj.d || 'No description')}</p>
                        ${proj.img ? `<img src="${proj.img}" class="project-img" alt="project">` : ''}
                        <div class="badge-icon" style="display:inline-block; margin-top: 10px;"><i class="far fa-calendar-alt"></i> ${proj.dt || 'Recent'}</div>
                    </div>
                `;
            });
            projectsDiv.innerHTML = projHtml;
        });
    }

    // ---------- Contractor Dashboard (PIN) ----------
    document.getElementById('openDashboardBtn')?.addEventListener('click', () => {
        if (!currentContractorId) {
            showToastMessage("Open contractor profile link first! (URL should have ?id=phoneNumber)", true);
            return;
        }
        const enteredPin = prompt("Enter your 4-digit PIN to access dashboard:");
        if (!enteredPin) return;
        db.ref(`contractors/${currentContractorId}/profile/pin`).once('value', (snap) => {
            if (snap.val() == enteredPin) {
                document.getElementById('contractorDash').classList.remove('hidden');
                showToastMessage("Dashboard unlocked! You can add projects & change banner.");
            } else {
                showToastMessage("Wrong PIN! Access denied.", true);
            }
        });
    });

    // Banner upload
    const bannerInput = document.getElementById('bannerImageInput');
    if (bannerInput) {
        bannerInput.addEventListener('change', (e) => {
            if (!currentContractorId) return alert("Contractor ID missing");
            const file = e.target.files[0];
            if (!file) return;
            compressImage(file, (base64) => {
                if (base64) {
                    db.ref(`contractors/${currentContractorId}/profile/b`).set(base64)
                        .then(() => showToastMessage("Banner image updated!"))
                        .catch(err => alert(err));
                } else showToastMessage("Compression failed", true);
            });
        });
    }

    // Project image + post
    const projectFileInput = document.getElementById('projectImageFile');
    if (projectFileInput) {
        projectFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            compressImage(file, (base64) => {
                if (base64) tempProjectImage = base64;
                else showToastMessage("Image error", true);
            });
        });
    }

    document.getElementById('submitProjectBtn')?.addEventListener('click', () => {
        if (!currentContractorId) return alert("No contractor linked");
        const title = document.getElementById('projectTitle').value.trim();
        const desc = document.getElementById('projectDesc').value.trim();
        if (!title) return showToastMessage("Project title required", true);
        if (!tempProjectImage) return showToastMessage("Please select a project image", true);
        const newRef = db.ref(`contractors/${currentContractorId}/projects`).push();
        newRef.set({
            t: title,
            d: desc || "—",
            img: tempProjectImage,
            dt: new Date().toLocaleDateString('en-GB')
        }).then(() => {
            showToastMessage("Project posted successfully!");
            document.getElementById('projectTitle').value = '';
            document.getElementById('projectDesc').value = '';
            projectFileInput.value = '';
            tempProjectImage = '';
        }).catch(err => alert(err));
    });

    // Registration logic
    document.getElementById('doRegisterBtn')?.addEventListener('click', () => {
        const fullName = document.getElementById('regFullName').value.trim();
        let phone = document.getElementById('regPhone').value.trim();
        const pin = document.getElementById('regPinCode').value.trim();
        if (!fullName) return showToastMessage("Full name required", true);
        if (!/^\d{10}$/.test(phone)) return showToastMessage("Valid 10-digit mobile number required", true);
        if (!pin || pin.length !== 4 || isNaN(pin)) return showToastMessage("PIN must be 4 digits", true);
        const finalId = phone;
        const defaultBanner = "https://images.unsplash.com/photo-1541888946425-d81bb19480c5?w=700";
        db.ref(`contractors/${finalId}`).once('value', (snap) => {
            if (snap.exists()) return showToastMessage("Phone already registered! Use different number", true);
            db.ref(`contractors/${finalId}`).set({
                profile: { n: fullName, p: phone, pin: pin, b: defaultBanner },
                status: 'ON',
                projects: null
            }).then(() => {
                const liveLink = `${window.location.origin}${window.location.pathname}?id=${finalId}`;
                document.getElementById('shareableLink').innerText = liveLink;
                document.getElementById('qrCodeContainer').innerHTML = "";
                new QRCode(document.getElementById("qrCodeContainer"), { text: liveLink, width: 160, height: 160 });
                document.getElementById('copyFinalLinkBtn').onclick = () => {
                    navigator.clipboard.writeText(liveLink);
                    showToastMessage("Link copied!");
                };
                document.getElementById('viewProfileFinalBtn').onclick = () => window.location.href = liveLink;
                document.getElementById('homeAfterRegBtn').onclick = () => window.location.href = window.location.pathname;
                toggleView('success-view');
            }).catch(err => alert(err));
        });
    });

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m){
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    // initial load
    if (currentContractorId) {
        loadContractorProfile(currentContractorId);
    } else {
        document.getElementById('profileDynamicArea').innerHTML = `<div class="glass-card" style="text-align:center;"><i class="fas fa-building"></i> <strong>Contractor Workspace</strong><br>Open a contractor link or register new.</div>`;
        document.getElementById('projectsList').innerHTML = '';
    }
</script>
</body>
</html>
